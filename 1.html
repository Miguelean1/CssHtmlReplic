<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ejercicio 1</title>

</head>
<body>

  <form>

    <div class="form-group">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" placeholder="nombre">
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="text" id="email" name="email" placeholder="mail">
    </div>

    <div class="form-group">
      <label for="telefono">Teléfono</label>
      <input type="text" id="telefono" name="telefono" placeholder="Su teléfono">
    </div>

    <fieldset>
      <legend>Lenguajes que conoce</legend>

      <div class="checkbox-group">
        <label for="javascript">Javascript</label>
        <input type="checkbox" id="javascript" name="lenguajes" value="javascript">
      </div>

      <div class="checkbox-group">
        <label for="php">PHP</label>
        <input type="checkbox" id="php" name="lenguajes" value="php">
      </div>

      <div class="checkbox-group">
        <label for="nodejs">NodeJS</label>
        <input type="checkbox" id="nodejs" name="lenguajes" value="nodejs">
      </div>

      <div class="checkbox-group">
        <label for="python">Python</label>
        <input type="checkbox" id="python" name="lenguajes" value="python">
      </div>
    </fieldset>

    <p class="seccion-titulo">Nivel de Inglés</p>

    <div class="radio-group">
      <label for="bajo">Bajo</label>
      <input type="radio" id="bajo" name="ingles" value="bajo">
    </div>

    <div class="radio-group">
      <label for="medio">Medio</label>
      <input type="radio" id="medio" name="ingles" value="medio">
    </div>

    <div class="radio-group">
      <label for="alto">Alto</label>
      <input type="radio" id="alto" name="ingles" value="alto">
    </div>

    <button type="submit">Enviar</button>

  </form>

</body>
</html>
